name: Spreadsheet compatibility

on:
  pull_request:
    paths:
      - "src/**"
      - "templates/**"
      - "reports/**"

permissions:
  contents: read

jobs:
  xlsx:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Generate workbook
        run: npm install && npm run generate:report
      - name: Test generated XLSX
        uses: Atomics-hub/sheetparity@v0.1.0-alpha.1
        with:
          file: reports/quarterly-report.xlsx
          matrix: libreoffice
